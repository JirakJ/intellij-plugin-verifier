# Reusable workflow for IntelliJ Plugin verification
# Called from individual plugin repos via workflow_call
#
# Usage in plugin repo (.github/workflows/verify.yml):
#   jobs:
#     verify:
#       uses: JirakJ/intellij-plugin-verifier/.github/workflows/verify-plugin.yml@main
#       with:
#         gradle-plugin-version: '2.x'  # or '1.x'
name: Verify IntelliJ Plugin

on:
  workflow_call:
    inputs:
      gradle-plugin-version:
        description: 'Gradle IntelliJ Plugin version: "2.x" (modern) or "1.x" (legacy)'
        required: false
        type: string
        default: '2.x'
      java-version:
        description: 'Java version for the build'
        required: false
        type: string
        default: '17'
      gradle-args:
        description: 'Additional Gradle arguments'
        required: false
        type: string
        default: ''
      runner-label:
        description: 'Runner to run on: "ubuntu-latest" (GitHub-hosted) or a self-hosted label e.g. "rpi"'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      PLUGIN_TOKEN:
        required: false

jobs:
  build-and-verify:
    name: Build, Test & Verify
    runs-on: ${{ inputs.runner-label }}
    timeout-minutes: 30
    steps:
      - name: Configure caches (host-specific)
        shell: bash
        run: |
          if [ "${{ inputs.runner-label }}" = "ubuntu-latest" ]; then
            # GitHub-hosted: cramped / (~21 GB) can't hold gradle caches + the 4
            # full IDEs verifyPlugin downloads. /mnt has ~74 GB — stage both there.
            sudo mkdir -p /mnt/gradle /mnt/pluginVerifier
            sudo chown -R "$(id -u):$(id -g)" /mnt/gradle /mnt/pluginVerifier
            mkdir -p "$HOME/.cache"
            ln -sfn /mnt/pluginVerifier "$HOME/.cache/pluginVerifier"
            echo "GRADLE_USER_HOME=/mnt/gradle" >> "$GITHUB_ENV"
            df -h / /mnt
          else
            # Self-hosted (e.g. Pi): roomy disk, use the warm ~/.gradle cache.
            echo "GRADLE_USER_HOME=$HOME/.gradle" >> "$GITHUB_ENV"
            df -h "$HOME" || true
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Remote build cache Post-step hangs on a home uplink (self-hosted).
          cache-disabled: ${{ inputs.runner-label != 'ubuntu-latest' }}

      - name: Free disk space
        # GitHub-hosted only. verifyPlugin downloads several full IDEs (~20 GB);
        # the default runner disk isn't enough. Reclaim ~25-30 GB. tool-cache:false
        # keeps the JDK installed by setup-java above. This action is Ubuntu/apt-
        # specific and would wreck a self-hosted host, so gate it.
        if: inputs.runner-label == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Disk space after cleanup
        if: inputs.runner-label == 'ubuntu-latest'
        run: df -h / /mnt

      - name: Build plugin
        run: ./gradlew buildPlugin ${{ inputs.gradle-args }}

      - name: Run tests
        run: ./gradlew test ${{ inputs.gradle-args }}

      - name: Verify plugin compatibility (modern 2.x)
        if: inputs.gradle-plugin-version == '2.x'
        run: ./gradlew verifyPlugin ${{ inputs.gradle-args }}

      - name: Verify plugin compatibility (legacy 1.x)
        if: inputs.gradle-plugin-version == '1.x'
        run: ./gradlew runPluginVerifier ${{ inputs.gradle-args }}

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: |
            build/reports/pluginVerifier/
            build/pluginVerifier/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: build/distributions/*.zip
          if-no-files-found: warn
          retention-days: 30
